version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: cc_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - campus_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cc_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/campus-connect
      - JWT_ACCESS_SECRET=your_docker_jwt_access_secret_123!
      - JWT_REFRESH_SECRET=your_docker_jwt_refresh_secret_456!
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - CLIENT_URL=http://localhost
    depends_on:
      - mongodb
    networks:
      - campus_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cc_frontend
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - campus_network

volumes:
  mongodb_data:

networks:
  campus_network:
    driver: bridge
